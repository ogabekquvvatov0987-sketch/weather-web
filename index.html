<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Weather App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* Umumiy reset (barcha elementlar uchun) */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    /* Default fon (Quyoshli osmon) */
    --text-color: #ffffff;
    --glass-bg: rgba(255, 255, 255, 0.1); /* Yumshoqroq shaffoflik */
    --glass-border: rgba(255, 255, 255, 0.2);
    --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.25); /* Yumshoqroq soya */
    --input-bg: rgba(255, 255, 255, 0.1);
    --btn-bg: rgba(255, 255, 255, 0.2); /* Slightly more opaque */
    --btn-hover: rgba(255, 255, 255, 0.3);
}

body.dark-mode {
    /* Tun rejimi */
    --text-color: #e0e0e0;
    --glass-bg: rgba(0, 0, 0, 0.3); /* Qorong'u va kontrastli */
    --glass-border: rgba(255, 255, 255, 0.18);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); /* Qorong'u soya */
    --input-bg: rgba(0, 0, 0, 0.35);
    --btn-bg: rgba(255, 255, 255, 0.12); /* Tugma ajralib turishi uchun (oldin: 0.1) */
    --btn-hover: rgba(255, 255, 255, 0.22); /* Lighter hover (oldin: 0.2) */
}

html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden; /* Gorizontal scrollni oldini olish */
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: url('https://images.pexels.com/photos/1188083/pexels-photo-1188083.png') no-repeat center center fixed; /* Video o'rniga zaxira fon */
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-color);
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6); /* Yozuvlar ko'rinishi uchun soya */
    transition: background 1s ease-in-out;
}

/* Animated Video Background */
#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto; /* object-fit: cover; bilan birga yaxshi ishlaydi */
    z-index: -100;
    filter: blur(10px) saturate(110%) brightness(0.7); /* Kuchliroq xiralashtirish va qoraytirish */
    transform: scale(1.1); /* Kadr chetlarini to'ldirish uchun */
    object-fit: cover;
    transition: opacity 3s ease-in-out; /* Almashish yanada sekinlashtirildi */
    will-change: opacity; /* Optimizatsiya */
}

/* Asosiy konteyner (Device wrapper) */
#app-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column; /* Elementlarni ustma-ust joylashtirish */
    position: relative;
    width: 100%;
    min-height: 100vh; /* Klaviatura uchun moslashuvchanlik */
    height: auto;
    overflow-y: auto; /* Kichik ekranlarda scroll bo'lishi uchun */
    padding: 20px;
    /* Yuklanish vaqtida yashirish */
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
    will-change: opacity;
}

/* Yuklanish tugagach ko'rsatish */
#app-wrapper.visible {
    opacity: 1;
    visibility: visible;
}

/* Glassmorphism Card */
.card {
    background: var(--glass-bg);
    backdrop-filter: blur(15px) saturate(150%); /* Eski qurilmalar uchun yengillashtirildi */
    -webkit-backdrop-filter: blur(15px) saturate(150%);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    padding: 30px;
    border-radius: 30px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease; /* Silliq "sakrash" effekti */
    will-change: transform, box-shadow;
    animation: card-fade-in 1s ease-out 0.5s;
    animation-fill-mode: backwards; /* Animatsiya boshlanishidan oldin yashirin turadi */
}

/* Eski qurilmalar uchun fallback (backdrop-filter ishlamasa) */
@supports not (backdrop-filter: blur(15px)) {
    .card, .settings-panel, .clock-widget {
        background: rgba(255, 255, 255, 0.9) !important;
    }
    body.dark-mode .card, body.dark-mode .settings-panel, body.dark-mode .clock-widget {
        background: rgba(30, 30, 30, 0.9) !important;
    }
}

@keyframes card-fade-in {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to { opacity: 1; transform: translateY(0); }
}

h1 { margin: 10px 0; font-size: 40px; font-weight: 700; }
h2 { margin-bottom: 20px; font-weight: 600; }

.input-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    width: 100%;
}

input {
    padding: 12px;
    width: 60%;
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    background: var(--input-bg);
    backdrop-filter: blur(5px);
    color: #fff;
    outline: none;
    font-size: 16px;
    transition: all 0.3s ease;
}
input:focus {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}
input::placeholder { color: var(--text-color); opacity: 0.7; }

/* Input xatolik holati */
.input-error {
    border-color: #ff6b6b !important;
    box-shadow: 0 0 10px rgba(255, 107, 107, 0.6) !important;
}
.input-error::placeholder {
    color: #ff6b6b !important;
    opacity: 1;
}

button {
    padding: 12px 25px;
    border: 1px solid var(--glass-border);
    border-radius: 50px; /* To'liq yumaloq shakl */
    background: var(--btn-bg);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    backdrop-filter: blur(10px); /* Shaffoflikni oshirish */
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); /* Tezroq reaksiya */
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: relative;
    will-change: transform, background, box-shadow;
    overflow: hidden;
}

/* Suyuq shisha (Liquid Glass) effekti */
button::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transition: 0.6s;
}
button:hover::after {
    left: 100%;
}

button:hover { 
    background: var(--btn-hover);
    transform: translateY(-2px) scale(1.03); /* Kichikroq, lekin sezilarli ko'tarilish */
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    border-color: rgba(255,255,255,0.4);
}
button:active {
    transform: scale(0.98) translateY(1px); /* Bosganda sezilarli "qimirlash" */
    transition-duration: 0.1s;
}

.location-btn {
    background: var(--btn-bg);
    padding: 12px;
}

/* Sozlamalar Tugmasi */
.settings-toggle {
    position: fixed;
    right: 20px;
    bottom: 20px; /* Yana pastga tushirildi */
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-color);
    font-size: 24px;
    cursor: pointer;
    z-index: 1001;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
    box-shadow: var(--glass-shadow);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
    /* Yuklanish vaqtida yashirish */
    opacity: 0;
    visibility: hidden;
    will-change: transform, opacity;
}
.settings-toggle:hover {
    transform: rotate(90deg) scale(1.1);
    background: rgba(255, 255, 255, 0.3);
}

/* Sozlamalar Paneli (Sidebar) */
.settings-panel {
    position: fixed;
    left: 50%;
    transform: translateX(-50%) translateY(30px); /* Markazlashtirish */
    bottom: 80px; /* Tugma ustida, ozroq pastga */
    width: 90%;
    max-width: 500px;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    padding: 15px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    display: flex;
    flex-direction: row; /* Gorizontal */
    flex-wrap: nowrap; /* iPhone stili uchun bir qatorda */
    justify-content: space-around;
    gap: 10px;
    z-index: 1000;
    box-shadow: var(--glass-shadow);
    /* Yashirish uchun */
    opacity: 0;
    visibility: hidden;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy effekt */
}
.settings-panel.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
}

.settings-group {
    position: relative;
    display: flex;
    flex-direction: row;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    padding: 4px;
    gap: 5px;
    flex: 1;
    align-items: center;
    justify-content: space-between;
}

/* Suyuq o'tish effekti uchun orqa fon (Segmented Control) */
.sliding-bg {
    position: absolute;
    top: 4px;
    left: 4px;
    height: calc(100% - 8px);
    background: rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.icon-btn {
    background: transparent;
    padding: 8px;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
    border: none;
    z-index: 1; /* Slayder ustida turishi uchun */
    color: var(--text-color);
    transition: color 0.3s;
}
.icon-btn.active {
    background: transparent;
    border: none;
    color: #fff;
    font-weight: bold;
    box-shadow: none;
}

.details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); /* Moslashuvchan ustunlar */
    gap: 10px;
    margin-top: 20px;
    font-size: 14px;
    text-align: left;
    background: rgba(0,0,0,0.1);
    padding: 15px;
    border-radius: 15px;
}

/* Magnit bo'roni uchun */
.geomagnetic-storm {
    margin-top: 15px;
    padding: 10px;
    background: rgba(255, 165, 0, 0.2); /* Ogohlantiruvchi rang */
    border: 1px solid rgba(255, 165, 0, 0.5);
    border-radius: 10px;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    display: none; /* By default hidden */
}

/* Mobil qurilmalar uchun moslashtirish (Responsive) */
@media (max-width: 768px) {
    body {
        font-size: 16px;
        /* align-items: flex-start;  Olib tashlandi, markazda turishi chiroyliroq */
    }
    
    .card {
        width: 100%;
        max-width: 100%;
        padding: 25px 20px;
        border-radius: 25px;
    }

    input, button {
        width: 100%;
        padding: 12px;
    }

    /* Qidiruv qatori uchun maxsus qoida (yonma-yon turishi uchun) */
    .input-group input {
        width: auto;
        flex: 1;
    }
    .input-group button {
        width: auto;
    }
}

/* LOADING SCREEN */
#loader-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 0.5s ease, visibility 0.5s;
    overflow: hidden;
}

#loader-wrapper::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://images.pexels.com/photos/1188083/pexels-photo-1188083.png') no-repeat center center; /* Bahor gullari */
    background-size: cover;
    filter: blur(15px) brightness(0.6); /* Tabiat fonini hiralashtirish */
    transform: scale(1.1);
    z-index: -1;
}

.loader-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
}

.welcome-msg {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 20px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    animation: fadeInWelcome 2s ease-in-out;
    will-change: opacity, transform;
}

@keyframes fadeInWelcome {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
}

.cloud-loader {
    position: relative;
    width: 150px;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px auto; /* Markazlashtirish */
}

.cloud {
    width: 120px;
    height: 60px;
    background: #fff;
    border-radius: 50px;
    position: relative;
    z-index: 2;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: float 2s ease-in-out infinite;
}

.cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
}

.cloud::before { width: 70px; height: 70px; top: -35px; left: 15px; }
.cloud::after { width: 50px; height: 50px; top: -20px; right: 15px; }

@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

/* Chaqmoq (Lightning) Animatsiyasi */
.lightning {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 10px 30px 10px;
    border-color: transparent transparent #FFD700 transparent;
    z-index: 1;
    animation: flashBolt 1s infinite; /* Tezroq chaqmoq */
    opacity: 0;
}
/* Chaqmoq chaqishi */
@keyframes flashBolt {
    0%, 45% { opacity: 0; transform: translateX(-50%) scale(0.8); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    60% { opacity: 0; }
    65% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    75% { opacity: 0; }
    100% { opacity: 0; }
}

.rain { position: absolute; top: 60px; width: 100%; height: 100%; z-index: 1; }
.drop {
    position: absolute; width: 3px; height: 15px; background: #00f2fe;
    opacity: 0.6; border-radius: 2px; animation: rain 1s infinite linear;
}
.drop:nth-child(1) { left: 20%; animation-delay: 0.2s; animation-duration: 0.7s; }
.drop:nth-child(2) { left: 40%; animation-delay: 0.4s; animation-duration: 0.9s; }

/* Qor (Snow) aralash */
.flake {
    position: absolute; width: 6px; height: 6px; background: #fff;
    border-radius: 50%; opacity: 0.8; animation: snow 2s infinite linear;
}
.flake:nth-child(3) { left: 60%; animation-delay: 0.1s; animation-duration: 2.5s; }
.flake:nth-child(4) { left: 80%; animation-delay: 0.5s; animation-duration: 3s; }

@keyframes rain { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }
@keyframes snow { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100px) rotate(360deg); opacity: 0; } }

.progress-text {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 18px; color: #333;
    font-weight: bold;
    z-index: 3;
}

.loading-msg {
    font-size: 18px;
    opacity: 0.9;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

/* SOAT VIDJETI (O'zbekiston vaqti) */
.clock-widget {
    position: relative; /* Fixed dan relative ga o'zgartirildi */
    margin-top: 20px;
    top: auto;
    left: auto;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    padding: 10px 30px;
    border-radius: 20px;
    color: var(--text-color);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    transition: all 0.3s ease;
}
.clock-time {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 1px;
}
.clock-date {
    font-size: 12px;
    opacity: 0.8;
    text-transform: capitalize;
}
/* Sekundlar uchun animatsiya */
.clock-seconds {
    font-size: 18px;
    opacity: 0.8;
}

/* BLOKLANGAN FOYDALANUVCHI EKRANI */
#blocked-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    z-index: 99999; /* Eng yuqorida */
    display: none; /* Default yopiq */
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}
#blocked-overlay h1 {
    font-size: 50px;
    margin-bottom: 20px;
}
#blocked-overlay p {
    font-size: 18px;
    color: #fff;
    max-width: 400px;
    line-height: 1.5;
}
</style>
</head>
<body>

<!-- Animated Video Background -->
<!-- Optimizatsiya: preload="auto" qo'shildi -->
<video autoplay loop playsinline muted preload="auto" id="bg-video" poster="https://images.pexels.com/photos/1188083/pexels-photo-1188083.png">
    <!-- Source JS orqali boshqariladi, ovoz boshida o'chirilgan -->
</video>

<!-- Loading Screen -->
<div id="loader-wrapper">
    <p class="welcome-msg" id="welcomeText"></p>
    <div class="loader-content">
        <div class="cloud-loader">
            <div class="cloud">
                <span class="progress-text" id="progressText">0%</span>
            </div>
            <div class="lightning"></div> <!-- Chaqmoq qo'shildi -->
            <div class="rain">
                <span class="drop"></span><span class="drop"></span> <!-- Yomg'ir -->
                <span class="flake"></span><span class="flake"></span> <!-- Qor aralash -->
            </div>
        </div>
        <p class="loading-msg" id="loadingText">...</p>
    </div>
</div>

<!-- Bloklangan foydalanuvchi ekrani -->
<div id="blocked-overlay">
    <h1>🚫</h1>
    <p id="blocked-msg">Siz bloklangansiz!</p>
</div>

<!-- Sozlamalar Tugmasi -->
<button class="settings-toggle" onclick="toggleSettings()">⚙️</button>

<!-- Sozlamalar Paneli -->
<div class="settings-panel" id="settingsPanel">
    <div class="settings-group">
        <div class="sliding-bg" id="slide_theme"></div>
        <button class="icon-btn" onclick="setTheme('light')" id="btn_light">☀️</button>
        <button class="icon-btn" onclick="setTheme('dark')" id="btn_dark">🌙</button>
    </div>
    <div class="settings-group">
        <div class="sliding-bg" id="slide_lang"></div>
        <button class="icon-btn" onclick="setLang('uz')" id="btn_lang_uz">🇺🇿 UZ</button>
        <button class="icon-btn" onclick="setLang('ru')" id="btn_lang_ru">🇷🇺 RU</button>
        <button class="icon-btn" onclick="setLang('en')" id="btn_lang_en">🇬🇧 EN</button>
    </div>

</div>

<!-- Asosiy Ilova -->
<div id="app-wrapper">
    <!-- Soat Vidjeti (Tushib qolgan kod qaytarildi) -->
    <div class="clock-widget">
        <div class="clock-time" id="clockTime">--:--</div>
        <div class="clock-date" id="clockDate">...</div>
    </div>

    <div class="card">
        <h2 id="app_title">🌤 Ob-havo</h2>
        <div class="input-group">
            <input type="text" id="city" placeholder="Shahar nomi">
            <button class="location-btn" onclick="getLocation()" id="btn_loc">📍</button>
        </div>
        <button onclick="getWeather()" id="btn_check">Ko‘rish</button>
        <div id="result"></div>
        <div class="geomagnetic-storm" id="geomagnetic-storm-info"></div>
    </div>
</div>

<script>
// API kalitni URL parametridan olish (Bot orqali yuboriladi)
const urlParams = new URLSearchParams(window.location.search);
let apiKey = urlParams.get('api_key');
const userName = urlParams.get('user_name');
const isBanned = urlParams.get('is_banned') === 'true' || urlParams.get('is_banned') === '1';
const urlLang = urlParams.get('lang') || 'uz'; // URL dan tilni olish

// Global variables to store current weather info
let currentWeatherConditionText = "";
let currentWeatherIsDay = true; // Default to day

// --- LOADING LOGIC (5 soniya) ---
document.addEventListener("DOMContentLoaded", () => {
    const loader = document.getElementById('loader-wrapper');
    const progressText = document.getElementById('progressText');
    const videoEl = document.getElementById('bg-video');
    const welcomeTextEl = document.getElementById('welcomeText');
    
    // Yuklash matnini tilga moslash
    const loadingTexts = {
        uz: "Sahifa yuklanmoqda, iltimos kuting...",
        ru: "Страница загружается, пожалуйста, подождите...",
        en: "Page is loading, please wait..."
    };
    const welcomeTexts = {
        uz: `Xush kelibsiz, ${userName || 'mehmon'}!`,
        ru: `Добро пожаловать, ${userName || 'гость'}!`,
        en: `Welcome, ${userName || 'guest'}!`
    };
    if (userName) {
        welcomeTextEl.innerText = welcomeTexts[urlLang] || welcomeTexts['uz'];
    }
    document.getElementById('loadingText').innerText = loadingTexts[urlLang] || loadingTexts['uz'];

    // Bloklanganlikni tekshirish
    if (isBanned) {
        showBlockedScreen();
        // Loader'ni darhol o'chirish yoki blok ekranini ustiga chiqarish
    }

    // Initialize theme state first
    const savedThemeState = localStorage.getItem('isDarkMode');
    const isDarkMode = (savedThemeState === 'true');
    document.body.classList.toggle('dark-mode', isDarkMode);
    
    // Agar foydalanuvchi hech qachon rejim tanlamagan bo'lsa, standart (kunduzgi) bo'lib qoladi

        videoEl.play().catch(e => { console.log("Autoplay blocked or failed:", e); });
    }, 100);

    // Soatni ishga tushirish
    setInterval(updateClock, 1000);
    updateClock();
    
    let percentage = 0;
    const duration = 5000; // 5 soniya
    const intervalTime = 50; // Har 50ms da yangilash
    const steps = duration / intervalTime;
    const increment = 100 / steps;

    const interval = setInterval(() => {
        percentage += increment;
        if (percentage >= 100) {
            percentage = 100;
            clearInterval(interval);
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                
                // Asosiy ilovani va sozlamalar tugmasini ko'rsatish
                document.getElementById('app-wrapper').classList.add('visible');

                settingsToggle.style.opacity = '1';
                settingsToggle.style.visibility = 'visible';
            }, 500);
        }
        
        // Update UI
        progressText.innerText = Math.round(percentage) + "%";
    }, intervalTime);

    // Oyna o'lchami o'zgarganda slayderlarni to'g'rilash (siliq ishlash uchun)
    window.addEventListener('resize', () => {
        const isDarkMode = document.body.classList.contains('dark-mode');
        updateToggleUI('theme', isDarkMode ? 'dark' : 'light');
        updateToggleUI('lang', currentLang);
    });
});

// Suyuq tugma (Segmented Control) logikasi
function updateToggleUI(group, value) {
    const slider = document.getElementById(`slide_${group}`);
    const btn = document.getElementById(`btn_${group}_${value}`) || document.getElementById(`btn_${value}`);
    
    if (slider && btn) {
        // Barcha tugmalardan active klassini olish
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.icon-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        // Tanlangan tugmaga active berish
        btn.classList.add('active');
        
        // Slayderni joylashtirish
        slider.style.width = `${btn.offsetWidth}px`;
        slider.style.left = `${btn.offsetLeft}px`;
    }
}

// Joylashuvni aniqlash
function getLocation() {
    if (isBanned) return;
    const resultDiv = document.getElementById("result");
    const t = translations[currentLang];
    
    if (navigator.geolocation) {
        resultDiv.innerHTML = t.loc_access;
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                fetchWeather(lat, lon, true);
            },
            (error) => {
                resultDiv.innerHTML = t.loc_denied;
            }
        );
    } else {
        resultDiv.innerHTML = "Geolocation is not supported by this browser.";
    }
}

// Orqa fonni ob-havoga qarab o'zgartirish
function updateBackgroundVideo(conditionText, apiIsDay) {
    const videoEl = document.getElementById('bg-video');
    const text = conditionText.toLowerCase();
    let newSrc = "";

    const isDarkModeActive = document.body.classList.contains('dark-mode');
    const effectiveIsDay = apiIsDay && !isDarkModeActive; // If API says day, but dark mode is active, treat as night for video selection

    // Aniq ob-havo uchun video havolalari (HD 1080p)
    // Bahor fasliga moslab yangilandi
    const videos = {
        thunder: "https://videos.pexels.com/video-files/2932333/2932333-hd_1920_1080_30fps.mp4", // Chaqmoq va bulutlar
        rainDay: "https://videos.pexels.com/video-files/4624227/4624227-hd_1920_1080_24fps.mp4", // Yomg'ir va ko'katlar
        rainNight: "https://videos.pexels.com/video-files/4527784/4527784-hd_1920_1080_25fps.mp4", // Tun, oyna, yomg'ir
        snow: "https://videos.pexels.com/video-files/856997/856997-hd_1920_1080_30fps.mp4", // Qor (bahorda kam bo'lsa ham)
        fogDay: "https://videos.pexels.com/video-files/2833497/2833497-hd_1920_1080_25fps.mp4",
        fogNight: "https://videos.pexels.com/video-files/5432943/5432943-hd_1920_1080_25fps.mp4",
        cloudsDay: "https://videos.pexels.com/video-files/3678380/3678380-hd_1920_1080_25fps.mp4", // Moviy osmon va bulutlar
        cloudsNight: "https://videos.pexels.com/video-files/3562852/3562852-hd_1920_1080_25fps.mp4", // Oy va bulutlar
        clearDay: "https://videos.pexels.com/video-files/4207205/4207205-hd_1920_1080_30fps.mp4", // Yashil maydon va quyosh
        clearNight: "https://videos.pexels.com/video-files/3121459/3121459-hd_1920_1080_25fps.mp4" // Tungi shahar
    };

    if (text.includes("thunder") || text.includes("chaqmoq")) {
        newSrc = videos.thunder;
    } else if (text.includes("rain") || text.includes("drizzle") || text.includes("yomg'ir")) {
        newSrc = effectiveIsDay ? videos.rainDay : videos.rainNight;
    } else if (text.includes("snow") || text.includes("qor") || text.includes("blizzard")) {
        newSrc = videos.snow; // Bu video kun va tun uchun mos keladi
    } else if (text.includes("mist") || text.includes("fog") || text.includes("tuman")) {
        newSrc = effectiveIsDay ? videos.fogDay : videos.fogNight;
    } else if (text.includes("cloud") || text.includes("overcast") || text.includes("bulut")) {
        newSrc = effectiveIsDay ? videos.cloudsDay : videos.cloudsNight;
    } else if (!effectiveIsDay) { // Ochiq tun
        newSrc = videos.clearNight;
    } else {
        // Ochiq kun (default)
        newSrc = videos.clearDay;
    }

    // Agar video o'zgargan bo'lsa, yangilash
    if (videoEl.src !== newSrc) {
        videoEl.style.opacity = 0; // Sekin o'tish uchun
        setTimeout(() => {
            videoEl.style.display = 'block'; // Agar oldin xato tufayli yashirilgan bo'lsa
            videoEl.src = newSrc;
            videoEl.load();
            videoEl.playbackRate = 0.5; // Videoni yanada sekinlashtirish (qotishni kamaytirish uchun)
            const playPromise = videoEl.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Video tayyor bo'lganda ko'rsatish
                    videoEl.oncanplay = () => { videoEl.style.opacity = 1; };
                    // Fallback: Agar oncanplay ishlamasa
                    setTimeout(() => { videoEl.style.opacity = 1; }, 500); 
                }).catch(error => {
                    console.warn("Video avtomatik ijro etilmadi. Bu ovozli videolar uchun normal holat.", error); // Ovoz bloklanganda
                    videoEl.style.opacity = 1;
                });
            }
        }, 500);
    }
}

// Magnit bo'roni ma'lumotini olish
async function getGeomagneticStormInfo() {
    const stormDiv = document.getElementById('geomagnetic-storm-info');
    const t = translations[currentLang];
    try {
        const response = await fetch('https://services.swpc.noaa.gov/products/alerts.json');
        const alerts = await response.json();
        const stormAlert = alerts.find(alert => alert.message.includes('Geomagnetic Storm Watch'));
        
        if (stormAlert) {
            stormDiv.innerText = `🛰️ ${t.g_storm_watch}`;
            stormDiv.style.display = 'block';
        } else {
            stormDiv.style.display = 'none';
        }
    } catch (error) {
        console.error("Geomagnetic storm fetch error:", error);
        stormDiv.style.display = 'none';
    }
}

async function getWeather() {
    if (isBanned) return;
    const cityInput = document.getElementById("city");
    const city = cityInput.value.trim();
    const resultDiv = document.getElementById("result");
    const t = translations[currentLang];

    if (!city) {
        cityInput.classList.add('input-error');
        const originalPlaceholder = cityInput.placeholder;
        cityInput.placeholder = currentLang === 'uz' ? "Iltimos shahar nomini kiriting!" : (currentLang === 'ru' ? "Введите название!" : "Enter city name!");
        setTimeout(() => {
            cityInput.classList.remove('input-error');
            cityInput.placeholder = originalPlaceholder;
        }, 3000);
        return;
    }
    
    fetchWeather(city, null, false);
}

async function fetchWeather(query, lon, isCoords) {
    const resultDiv = document.getElementById("result");
    const t = translations[currentLang];
    getGeomagneticStormInfo(); // Magnit bo'roni tekshiruvini chaqirish
    
    // WeatherAPI.com dan foydalanamiz
    let url = "";
    const q = isCoords ? `${query},${lon}` : query;
    
    // Forecast endpoint orqali kunlik ma'lumot (sunrise/sunset uchun)
    url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${q}&days=1&aqi=no&alerts=no&lang=${currentLang}`;

    try {
        const response = await fetch(url);

        if (!response.ok) {
            const errData = await response.json();
            const errMsg = errData.error?.message || "Unknown error";
            console.error("API Error:", errMsg);

            if (response.status === 400 && !isCoords) {
                resultDiv.innerHTML = `${t.error_not_found}<br><br><button class="location-btn" onclick="getLocation()" style="width:100%">${t.loc_access.replace('...', '')}</button>`;
            } else {
                resultDiv.innerHTML = `❌ <b>Xatolik (${response.status}):</b><br>${errMsg}`;
            }
            return;
        }

        const data = await response.json();
        console.log("WeatherAPI Response:", data); // Tilni tekshirish uchun
        const current = data.current;
        const location = data.location;
        currentWeatherConditionText = current.condition.text;
        currentWeatherIsDay = current.is_day;
        
        // Fonni yangilash
        updateBackgroundVideo(current.condition.text, current.is_day);

        resultDiv.innerHTML = `
            <h2>${location.name}, ${location.country}</h2>
            <h1>${Math.round(current.temp_c)}°C</h1>
            <p>${current.condition.text}</p>
            
            <div class="details-grid">
                <div>🌡 ${t.feels_like}: ${Math.round(current.feelslike_c)}°C</div>
                <div>💧 ${t.humidity}: ${current.humidity}%</div>
                <div>💨 ${t.wind}: ${(current.wind_kph / 3.6).toFixed(1)} m/s</div>
                <div>🧭 ${t.wind_dir}: ${current.wind_dir}</div>
                <div>☀️ ${t.uv_index}: ${current.uv}</div>
                <div>👁️ ${t.visibility}: ${current.vis_km} km</div>
            </div>
        `;

    } catch (error) {
        resultDiv.innerHTML = `${t.error_net}<br><small>${error.message}</small>`;
        console.error(error);
    }
}

// O'zbekiston vaqti soati
function updateClock() {
    const now = new Date();
    const t = translations[currentLang];
    
    // O'zbekiston vaqti (UTC+5)
    const optionsTime = { timeZone: 'Asia/Tashkent', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const timeString = now.toLocaleTimeString('en-US', optionsTime);
    
    // Sana (Tilga moslashgan)
    const optionsDate = { timeZone: 'Asia/Tashkent', weekday: 'long', day: 'numeric', month: 'long' };
    const dateString = now.toLocaleDateString(t.date_locale, optionsDate);
    
    // Sekundlarni kichikroq qilish uchun HTML formatlash
    const [time, period] = timeString.split(' '); // AM/PM bo'lsa ajratish (bizda 24 soatlik)
    // timeString masalan "14:30:45"
    const parts = timeString.split(':');
    
    // Xavfsizlik tekshiruvi: Elementlar mavjudligini tekshiramiz
    const timeEl = document.getElementById('clockTime');
    const dateEl = document.getElementById('clockDate');
    
    if (timeEl && dateEl) {
        if (parts.length === 3) {
            timeEl.innerHTML = `${parts[0]}:${parts[1]}<span class="clock-seconds">:${parts[2]}</span>`;
        } else {
            timeEl.innerText = timeString;
        }
        dateEl.innerText = dateString;
    }
}
