<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Weather App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* Umumiy reset (barcha elementlar uchun) */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    /* Default fon (Quyoshli osmon) */
    /* --bg-image is deprecated, using video now */
    --text-color: #fff;
    --glass-bg: rgba(255, 255, 255, 0.05); /* More transparent */
    --glass-border: rgba(255, 255, 255, 0.15);
    --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    --input-bg: rgba(255, 255, 255, 0.1);
    --btn-bg: rgba(255, 255, 255, 0.2); /* Slightly more opaque */
    --btn-hover: rgba(255, 255, 255, 0.3);
}

body.dark-mode {
    /* Tun rejimi */
    --text-color: #e0e0e0;
    --glass-bg: rgba(0, 0, 0, 0.25); /* Karta ajralib turishi uchun (oldin: 0.4) */
    --glass-border: rgba(255, 255, 255, 0.15); /* Chegara chizig'i yorqinroq (oldin: 0.1) */
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
    --input-bg: rgba(0, 0, 0, 0.4);
    --btn-bg: rgba(255, 255, 255, 0.12); /* Tugma ajralib turishi uchun (oldin: 0.1) */
    --btn-hover: rgba(255, 255, 255, 0.22); /* Lighter hover (oldin: 0.2) */
}

html, body {
    width: 100%;
    height: 100%;
    overflow-x: hidden; /* Gorizontal scrollni oldini olish */
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000; /* Video yuklanmaguncha qora fon */
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-color);
    transition: background 1s ease-in-out;
}

/* Animated Video Background */
#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -100;
    filter: blur(8px) saturate(120%); /* Optimizatsiya: biroz kamaytirildi, ranglar to'yintirildi */
    transform: scale(1.05); /* Kesilib qolishni kamaytirish uchun masshtab kichraytirildi */
    object-fit: cover;
    transition: opacity 3s ease-in-out; /* Almashish yanada sekinlashtirildi */
    will-change: opacity; /* Optimizatsiya */
}

/* Asosiy konteyner (Device wrapper) */
#app-wrapper {
    width: 100%;
    min-height: 100vh; /* Klaviatura uchun moslashuvchanlik */
    height: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column; /* Elementlarni ustma-ust joylashtirish */
    position: relative;
    overflow-y: auto; /* Kichik ekranlarda scroll bo'lishi uchun */
    padding: 20px;
}

/* Glassmorphism Card */
.card {
    background: var(--glass-bg);
    backdrop-filter: blur(25px) saturate(200%); /* Kuchliroq blur va to'yinganlik */
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    padding: 30px;
    border-radius: 30px;
    text-align: center;
    width: 100%;
    max-width: 400px; /* Biroz kengaytirildi */
    transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

h1 { margin: 10px 0; font-size: 40px; font-weight: 700; }
h2 { margin-bottom: 20px; font-weight: 600; }

.input-group {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    width: 100%;
}

input {
    padding: 12px;
    width: 60%;
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    background: var(--input-bg);
    backdrop-filter: blur(5px);
    color: #fff;
    outline: none;
    font-size: 16px;
    transition: all 0.3s ease;
}
input:focus {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
}
input::placeholder { color: var(--text-color); opacity: 0.7; }

/* Input xatolik holati */
.input-error {
    border-color: #ff4d4d !important;
    box-shadow: 0 0 10px rgba(255, 77, 77, 0.5) !important;
}
.input-error::placeholder {
    color: #ff4d4d !important;
    opacity: 1;
}

button {
    padding: 12px 25px;
    border: 1px solid var(--glass-border);
    border-radius: 50px; /* To'liq yumaloq shakl */
    background: var(--btn-bg);
    color: white;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.5px;
    backdrop-filter: blur(10px); /* Shaffoflikni oshirish */
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}

/* Suyuq shisha (Liquid Glass) effekti */
button::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transition: 0.6s;
}
button:hover::after {
    left: 100%;
}

button:hover { 
    background: var(--btn-hover); 
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    border-color: rgba(255,255,255,0.4);
}
button:active { transform: scale(0.95); transform: translateY(0); border-radius: 50px; }

.location-btn {
    background: var(--btn-bg);
    padding: 12px;
}

/* Sozlamalar Tugmasi */
.settings-toggle {
    position: fixed;
    right: 20px;
    bottom: 20px; /* Yana pastga tushirildi */
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-color);
    font-size: 24px;
    cursor: pointer;
    z-index: 1001;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
    box-shadow: var(--glass-shadow);
    transition: transform 0.3s, background 0.3s;
}
.settings-toggle:hover {
    transform: rotate(90deg);
    background: rgba(255, 255, 255, 0.3);
}

/* Sozlamalar Paneli (Sidebar) */
.settings-panel {
    position: fixed;
    left: 50%;
    transform: translateX(-50%) translateY(30px); /* Markazlashtirish */
    bottom: 80px; /* Tugma ustida, ozroq pastga */
    width: 90%;
    max-width: 500px;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    padding: 15px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    display: flex;
    flex-direction: row; /* Gorizontal */
    flex-wrap: nowrap; /* iPhone stili uchun bir qatorda */
    justify-content: space-around;
    gap: 10px;
    z-index: 1000;
    box-shadow: var(--glass-shadow);
    /* Yashirish uchun */
    opacity: 0;
    visibility: hidden;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy effekt */
}
.settings-panel.active {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
}

.settings-group {
    position: relative;
    display: flex;
    flex-direction: row;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    padding: 4px;
    gap: 5px;
    flex: 1;
    align-items: center;
    justify-content: space-between;
}

/* Suyuq o'tish effekti uchun orqa fon (Segmented Control) */
.sliding-bg {
    position: absolute;
    top: 4px;
    left: 4px;
    height: calc(100% - 8px);
    background: rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.icon-btn {
    background: transparent;
    padding: 8px;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
    border: none;
    z-index: 1; /* Slayder ustida turishi uchun */
    color: var(--text-color);
    transition: color 0.3s;
}
.icon-btn.active {
    background: transparent;
    border: none;
    color: #fff;
    font-weight: bold;
    box-shadow: none;
}

.details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); /* Moslashuvchan ustunlar */
    gap: 10px;
    margin-top: 20px;
    font-size: 14px;
    text-align: left;
    background: rgba(0,0,0,0.1);
    padding: 15px;
    border-radius: 15px;
}

/* Magnit bo'roni uchun */
.geomagnetic-storm {
    margin-top: 15px;
    padding: 10px;
    background: rgba(255, 165, 0, 0.2); /* Ogohlantiruvchi rang */
    border: 1px solid rgba(255, 165, 0, 0.5);
    border-radius: 10px;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    display: none; /* By default hidden */
}

/* Mobil qurilmalar uchun moslashtirish (Responsive) */
@media (max-width: 768px) {
    body {
        font-size: 16px;
        /* align-items: flex-start;  Olib tashlandi, markazda turishi chiroyliroq */
    }
    
    .card {
        width: 100%;
        max-width: 100%;
        padding: 25px 20px;
        border-radius: 25px;
    }

    input, button {
        width: 100%;
        padding: 12px;
    }

    /* Qidiruv qatori uchun maxsus qoida (yonma-yon turishi uchun) */
    .input-group input {
        width: auto;
        flex: 1;
    }
    .input-group button {
        width: auto;
    }
}

/* LOADING SCREEN */
#loader-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 0.5s ease, visibility 0.5s;
}

#loader-video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(10px); /* Xiralashtirish effekti */
}

.loader-content {
    text-align: center;
    color: white;
}

.cloud-loader {
    position: relative;
    width: 150px;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px auto; /* Markazlashtirish */
}

.cloud {
    width: 120px;
    height: 60px;
    background: #fff;
    border-radius: 50px;
    position: relative;
    z-index: 2;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: float 2s ease-in-out infinite;
}

.cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
}

.cloud::before { width: 70px; height: 70px; top: -35px; left: 15px; }
.cloud::after { width: 50px; height: 50px; top: -20px; right: 15px; }

@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.rain { position: absolute; top: 60px; width: 100%; height: 100%; z-index: 1; }
.drop {
    position: absolute; width: 3px; height: 15px; background: #00f2fe;
    opacity: 0.6; border-radius: 2px; animation: rain 1s infinite linear;
}
.drop:nth-child(1) { left: 20%; animation-delay: 0.2s; animation-duration: 0.7s; }
.drop:nth-child(2) { left: 40%; animation-delay: 0.4s; animation-duration: 0.9s; }
.drop:nth-child(3) { left: 60%; animation-delay: 0.1s; animation-duration: 0.8s; }
.drop:nth-child(4) { left: 80%; animation-delay: 0.3s; animation-duration: 0.6s; }

@keyframes rain { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }

.progress-text {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 18px; color: #333;
    font-weight: bold;
    z-index: 3;
}

.loading-msg {
    font-size: 18px;
    opacity: 0.9;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
}

/* SOAT VIDJETI (O'zbekiston vaqti) */
.clock-widget {
    position: relative; /* Fixed dan relative ga o'zgartirildi */
    margin-top: 20px;
    top: auto;
    left: auto;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    padding: 10px 30px;
    border-radius: 20px;
    color: var(--text-color);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    transition: all 0.3s ease;
}
.clock-time {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 1px;
}
.clock-date {
    font-size: 12px;
    opacity: 0.8;
    text-transform: capitalize;
}
/* Sekundlar uchun animatsiya */
.clock-seconds {
    font-size: 18px;
    opacity: 0.8;
}

/* BLOKLANGAN FOYDALANUVCHI EKRANI */
#blocked-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    z-index: 99999; /* Eng yuqorida */
    display: none; /* Default yopiq */
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}
#blocked-overlay h1 {
    font-size: 50px;
    margin-bottom: 20px;
}
#blocked-overlay p {
    font-size: 18px;
    color: #fff;
    max-width: 400px;
    line-height: 1.5;
}
</style>
</head>
<body>

<!-- Animated Video Background -->
<!-- Optimizatsiya: preload="auto" qo'shildi -->
<video autoplay loop playsinline muted preload="auto" id="bg-video">
    <!-- Source JS orqali boshqariladi, ovoz boshida o'chirilgan -->
</video>

<!-- Loading Screen -->
<div id="loader-wrapper">
    <div class="loader-content">
        <div class="cloud-loader">
            <div class="cloud">
                <span class="progress-text" id="progressText">0%</span>
            </div>
            <div class="rain">
                <span class="drop"></span><span class="drop"></span><span class="drop"></span><span class="drop"></span>
            </div>
        </div>
        <p class="loading-msg" id="loadingText">...</p>
    </div>
</div>

<!-- Bloklangan foydalanuvchi ekrani -->
<div id="blocked-overlay">
    <h1>🚫</h1>
    <p id="blocked-msg">Siz bloklangansiz!</p>
</div>

<!-- Sozlamalar Tugmasi -->
<button class="settings-toggle" onclick="toggleSettings()">⚙️</button>

<!-- Sozlamalar Paneli -->
<div class="settings-panel" id="settingsPanel">
    <div class="settings-group">
        <div class="sliding-bg" id="slide_theme"></div>
        <button class="icon-btn" onclick="setTheme('light')" id="btn_light">☀️</button>
        <button class="icon-btn" onclick="setTheme('dark')" id="btn_dark">🌙</button>
    </div>
    <div class="settings-group">
        <div class="sliding-bg" id="slide_lang"></div>
        <button class="icon-btn" onclick="setLang('uz')" id="btn_lang_uz">🇺🇿 UZ</button>
        <button class="icon-btn" onclick="setLang('ru')" id="btn_lang_ru">🇷🇺 RU</button>
        <button class="icon-btn" onclick="setLang('en')" id="btn_lang_en">🇬🇧 EN</button>
    </div>

</div>

<!-- Asosiy Ilova -->
<div id="app-wrapper">
    <div class="card">
        <h2 id="app_title">🌤 Ob-havo</h2>
        <div class="input-group">
            <input type="text" id="city" placeholder="Shahar nomi">
            <button class="location-btn" onclick="getLocation()" id="btn_loc">📍</button>
        </div>
        <button onclick="getWeather()" id="btn_check">Ko‘rish</button>
        <div id="result"></div>
        <div class="geomagnetic-storm" id="geomagnetic-storm-info"></div>
    </div>
</div>

<script>
// API kalitni URL parametridan olish (Bot orqali yuboriladi)
const urlParams = new URLSearchParams(window.location.search);
let apiKey = urlParams.get('api_key');
const isBanned = urlParams.get('is_banned') === 'true' || urlParams.get('is_banned') === '1';
const urlLang = urlParams.get('lang') || 'uz'; // URL dan tilni olish

// Global variables to store current weather info
let currentWeatherConditionText = "";
let currentWeatherIsDay = true; // Default to day

// --- LOADING LOGIC (5 soniya) ---
document.addEventListener("DOMContentLoaded", () => {
    const loader = document.getElementById('loader-wrapper');
    const progressText = document.getElementById('progressText');
    const videoEl = document.getElementById('bg-video');
    
    // Yuklash matnini tilga moslash
    const loadingTexts = {
        uz: "Sahifa yuklanmoqda, iltimos kuting...",
        ru: "Страница загружается, пожалуйста, подождите...",
        en: "Page is loading, please wait..."
    };
    document.getElementById('loadingText').innerText = loadingTexts[urlLang] || loadingTexts['uz'];

    // Bloklanganlikni tekshirish
    if (isBanned) {
        showBlockedScreen();
        // Loader'ni darhol o'chirish yoki blok ekranini ustiga chiqarish
    }

    // Initialize theme state first
    const savedThemeState = localStorage.getItem('isDarkMode');
    const isDarkMode = (savedThemeState === 'true');
    document.body.classList.toggle('dark-mode', isDarkMode);
    
    // UI holatini yangilash (Slayderlar)
    updateToggleUI('theme', isDarkMode ? 'dark' : 'light');

    // Input xatoligini tozalash uchun listener
    document.getElementById('city').addEventListener('input', function() {
        this.classList.remove('input-error');
    });

    // YUKLANGANDA MAVZUGA MOS VIDEO O'RNATISH
    if (isDarkMode) {
        // Tungi rejim: Aylanayotgan Yer shari (Space/Earth)
        videoEl.src = "https://videos.pexels.com/video-files/1851190/1851190-hd_1920_1080_25fps.mp4";
    } else {
        // Kunduzgi rejim: Ochiq osmon
        videoEl.src = "https://videos.pexels.com/video-files/853871/853871-hd_1920_1080_25fps.mp4";
    }
    videoEl.load();
    videoEl.play().catch(e => {}); // Ba'zi brauzerlarda avtomatik ijro etish bloklanishi mumkin

    // Soatni ishga tushirish
    setInterval(updateClock, 1000);
    updateClock();
    
    let percentage = 0;
    const duration = 5000; // 5 soniya
    const intervalTime = 50; // Har 50ms da yangilash
    const steps = duration / intervalTime;
    const increment = 100 / steps;

    const interval = setInterval(() => {
        percentage += increment;
        if (percentage >= 100) {
            percentage = 100;
            clearInterval(interval);
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                // Sahifa yuklangach, avtomatik joylashuv bo'yicha ob-havoni ko'rsatish
                // TALAB: Avtomatik ob-havo ko'rish bekor qilindi
                // getLocation(); 
            }, 500);
        }
        
        // Update UI
        progressText.innerText = Math.round(percentage) + "%";
    }, intervalTime);

    // Oyna o'lchami o'zgarganda slayderlarni to'g'rilash (siliq ishlash uchun)
    window.addEventListener('resize', () => {
        const isDarkMode = document.body.classList.contains('dark-mode');
        updateToggleUI('theme', isDarkMode ? 'dark' : 'light');
        updateToggleUI('lang', currentLang);
    });
});

// Agar kalit yo'q bo'lsa yoki placeholder bo'lsa, zaxira kalitni (WeatherAPI) ishlatamiz
if (!apiKey || apiKey === "OPENWEATHER_API_KEYINGIZ") {
    apiKey = "ff551288f31542a8bd7181253261602";
}

// Tarjimalar
const translations = {
    uz: {
        title: "🌤 Ob-havo",
        placeholder: "Shahar nomi...",
        btn: "Ko‘rish",
        theme: "Mavzu",
        lang: "Til",
        error_empty: "❗ Shahar nomini kiriting",
        error_not_found: "❌ Shahar topilmadi",
        error_net: "⚠ Internet xatosi",
        humidity: "Namlik",
        wind: "Shamol",
        feels_like: "His qilinishi",
        uv_index: "UV Indeks",
        visibility: "Ko'rinish",
        wind_dir: "Shamol yo'n.",
        lbl_theme: "Mavzu",
        lbl_lang: "Til",
        lbl_sound: "Ovoz",
        g_storm_watch: "Magnit bo'roni kutilmoqda",
        loc_access: "📍 Joylashuvni aniqlash...",
        loc_denied: "❌ Joylashuvga ruxsat berilmadi",
        blocked_msg: "🚫 Siz bloklangansiz!\nIltimos, admin bilan bog'laning yoki kuting.",
        date_locale: "uz-UZ"
    },
    ru: {
        title: "🌤 Погода",
        placeholder: "Название города...",
        btn: "Показать",
        theme: "Тема",
        lang: "Язык",
        error_empty: "❗ Введите название города",
        error_not_found: "❌ Город не найден",
        error_net: "⚠ Ошибка сети",
        humidity: "Влажность",
        wind: "Ветер",
        feels_like: "Ощущается",
        uv_index: "УФ-индекс",
        visibility: "Видимость",
        wind_dir: "Напр. ветра",
        lbl_theme: "Тема",
        lbl_lang: "Язык",
        lbl_sound: "Звук",
        g_storm_watch: "Ожидается магнитная буря",
        loc_access: "📍 Определение местоположения...",
        loc_denied: "❌ Доступ к геопозиции запрещен",
        blocked_msg: "🚫 Вы заблокированы!\nПожалуйста, свяжитесь с админом или подождите.",
        date_locale: "ru-RU"
    },
    en: {
        title: "🌤 Weather",
        placeholder: "City name...",
        btn: "Check",
        theme: "Theme",
        lang: "Lang",
        error_empty: "❗ Enter city name",
        error_not_found: "❌ City not found",
        error_net: "⚠ Network error",
        humidity: "Humidity",
        wind: "Wind",
        feels_like: "Feels like",
        uv_index: "UV Index",
        visibility: "Visibility",
        wind_dir: "Wind Dir.",
        lbl_theme: "Theme",
        lbl_lang: "Lang",
        lbl_sound: "Sound",
        g_storm_watch: "Geomagnetic storm watch",
        loc_access: "📍 Locating...",
        loc_denied: "❌ Location denied",
        blocked_msg: "🚫 You are blocked!\nPlease contact admin or wait.",
        date_locale: "en-US"
    }
};

let currentLang = urlLang; // Boshlang'ich til URL dan olinadi

function setLang(lang) {
    currentLang = lang;
    const t = translations[lang];
    
    document.getElementById('app_title').innerText = t.title;
    document.getElementById('city').placeholder = t.placeholder;
    document.getElementById('btn_check').innerText = t.btn;
    document.getElementById('blocked-msg').innerText = t.blocked_msg;
    
    // Suyuq tugma holatini yangilash
    updateToggleUI('lang', lang);
    
    // Agar natija ko'rsatilgan bo'lsa, uni tozalash yoki yangilash mumkin
    document.getElementById('result').innerHTML = "";
    
    // Soatni yangilash (sana tili o'zgarishi uchun)
    updateClock();
}

function setTheme(theme) {
    const isDarkMode = (theme === 'dark');
    document.body.classList.toggle('dark-mode', isDarkMode);
    localStorage.setItem('isDarkMode', isDarkMode);

    // UI yangilash
    updateToggleUI('theme', theme);

    // Fonni yangilash
    if (currentWeatherConditionText) {
        updateBackgroundVideo(currentWeatherConditionText, currentWeatherIsDay);
    } else {
        // Default fonni yangilash
        const videoEl = document.getElementById('bg-video');
        if (isDarkMode) {
            videoEl.src = "https://videos.pexels.com/video-files/1851190/1851190-hd_1920_1080_25fps.mp4"; // Yer shari
        } else {
            videoEl.src = "https://videos.pexels.com/video-files/853871/853871-hd_1920_1080_25fps.mp4"; // Ochiq osmon
        }
        videoEl.play().catch(e=>{});
    }
}

// Suyuq tugma (Segmented Control) logikasi
function updateToggleUI(group, value) {
    const slider = document.getElementById(`slide_${group}`);
    const btn = document.getElementById(`btn_${group}_${value}`) || document.getElementById(`btn_${value}`);
    
    if (slider && btn) {
        // Barcha tugmalardan active klassini olish
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.icon-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        // Tanlangan tugmaga active berish
        btn.classList.add('active');
        
        // Slayderni joylashtirish
        slider.style.width = `${btn.offsetWidth}px`;
        slider.style.left = `${btn.offsetLeft}px`;
    }
}

function toggleSettings() {
    if (isBanned) return; // Bloklangan bo'lsa ochilmaydi
    const panel = document.getElementById('settingsPanel');
    panel.classList.toggle('active');
}

// Joylashuvni aniqlash
function getLocation() {
    if (isBanned) return;
    const resultDiv = document.getElementById("result");
    const t = translations[currentLang];
    
    if (navigator.geolocation) {
        resultDiv.innerHTML = t.loc_access;
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                fetchWeather(lat, lon, true);
            },
            (error) => {
                resultDiv.innerHTML = t.loc_denied;
            }
        );
    } else {
        resultDiv.innerHTML = "Geolocation is not supported by this browser.";
    }
}

// Orqa fonni ob-havoga qarab o'zgartirish
function updateBackgroundVideo(conditionText, apiIsDay) {
    const videoEl = document.getElementById('bg-video');
    const text = conditionText.toLowerCase();
    let newSrc = "";

    const isDarkModeActive = document.body.classList.contains('dark-mode');
    const effectiveIsDay = apiIsDay && !isDarkModeActive; // If API says day, but dark mode is active, treat as night for video selection

    // Aniq ob-havo uchun video havolalari (HD 1080p)
    const videos = {
        thunder: "https://videos.pexels.com/video-files/6992288/6992288-hd_1920_1080_25fps.mp4",
        rainDay: "https://videos.pexels.com/video-files/1732934/1732934-hd_1920_1080_30fps.mp4",
        rainNight: "https://videos.pexels.com/video-files/8033595/8033595-hd_1920_1080_25fps.mp4",
        snow: "https://videos.pexels.com/video-files/3253429/3253429-hd_1920_1080_25fps.mp4", // Kun/tun uchun mos
        fogDay: "https://videos.pexels.com/video-files/2833497/2833497-hd_1920_1080_25fps.mp4",
        fogNight: "https://videos.pexels.com/video-files/5432943/5432943-hd_1920_1080_25fps.mp4",
        cloudsDay: "https://videos.pexels.com/video-files/855344/855344-hd_1920_1080_24fps.mp4",
        cloudsNight: "https://videos.pexels.com/video-files/5794557/5794557-hd_1920_1080_25fps.mp4",
        clearDay: "https://videos.pexels.com/video-files/853871/853871-hd_1920_1080_25fps.mp4",
        clearNight: "https://videos.pexels.com/video-files/1851190/1851190-hd_1920_1080_25fps.mp4" // Aylanayotgan Yer shari (Space)
    };

    if (text.includes("thunder") || text.includes("chaqmoq")) {
        newSrc = videos.thunder;
    } else if (text.includes("rain") || text.includes("drizzle") || text.includes("yomg'ir")) {
        newSrc = effectiveIsDay ? videos.rainDay : videos.rainNight;
    } else if (text.includes("snow") || text.includes("qor") || text.includes("blizzard")) {
        newSrc = videos.snow; // Bu video kun va tun uchun mos keladi
    } else if (text.includes("mist") || text.includes("fog") || text.includes("tuman")) {
        newSrc = effectiveIsDay ? videos.fogDay : videos.fogNight;
    } else if (text.includes("cloud") || text.includes("overcast") || text.includes("bulut")) {
        newSrc = effectiveIsDay ? videos.cloudsDay : videos.cloudsNight;
    } else if (!effectiveIsDay) { // Ochiq tun
        newSrc = videos.clearNight;
    } else {
        // Ochiq kun (default)
        newSrc = videos.clearDay;
    }

    // Agar video o'zgargan bo'lsa, yangilash
    if (videoEl.src !== newSrc) {
        videoEl.style.opacity = 0; // Sekin o'tish uchun
        setTimeout(() => {
            videoEl.src = newSrc;
            videoEl.load();
            videoEl.playbackRate = 0.5; // Videoni yanada sekinlashtirish (qotishni kamaytirish uchun)
            const playPromise = videoEl.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    videoEl.style.opacity = 1;
                }).catch(error => {
                    console.warn("Video avtomatik ijro etilmadi. Bu ovozli videolar uchun normal holat.", error); // Ovoz bloklanganda
                    videoEl.style.opacity = 1;
                });
            }
        }, 500);
    }
}

// Magnit bo'roni ma'lumotini olish
async function getGeomagneticStormInfo() {
    const stormDiv = document.getElementById('geomagnetic-storm-info');
    const t = translations[currentLang];
    try {
        const response = await fetch('https://services.swpc.noaa.gov/products/alerts.json');
        const alerts = await response.json();
        const stormAlert = alerts.find(alert => alert.message.includes('Geomagnetic Storm Watch'));
        
        if (stormAlert) {
            stormDiv.innerText = `🛰️ ${t.g_storm_watch}`;
            stormDiv.style.display = 'block';
        } else {
            stormDiv.style.display = 'none';
        }
    } catch (error) {
        console.error("Geomagnetic storm fetch error:", error);
        stormDiv.style.display = 'none';
    }
}

async function getWeather() {
    if (isBanned) return;
    const cityInput = document.getElementById("city");
    const city = cityInput.value.trim();
    const resultDiv = document.getElementById("result");
    const t = translations[currentLang];

    if (!city) {
        cityInput.classList.add('input-error');
        const originalPlaceholder = cityInput.placeholder;
        cityInput.placeholder = currentLang === 'uz' ? "Iltimos shahar nomini kiriting!" : (currentLang === 'ru' ? "Введите название!" : "Enter city name!");
        setTimeout(() => {
            cityInput.classList.remove('input-error');
            cityInput.placeholder = originalPlaceholder;
        }, 3000);
        return;
    }
    
    fetchWeather(city, null, false);
}

async function fetchWeather(query, lon, isCoords) {
    const resultDiv = document.getElementById("result");
    const t = translations[currentLang];
    getGeomagneticStormInfo(); // Magnit bo'roni tekshiruvini chaqirish
    
    // WeatherAPI.com dan foydalanamiz
    let url = "";
    const q = isCoords ? `${query},${lon}` : query;
    
    // Forecast endpoint orqali kunlik ma'lumot (sunrise/sunset uchun)
    url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${q}&days=1&aqi=no&alerts=no&lang=${currentLang}`;

    try {
        const response = await fetch(url);

        if (!response.ok) {
            const errData = await response.json();
            const errMsg = errData.error?.message || "Unknown error";
            console.error("API Error:", errMsg);

            if (response.status === 400 && !isCoords) {
                resultDiv.innerHTML = `${t.error_not_found}<br><br><button class="location-btn" onclick="getLocation()" style="width:100%">${t.loc_access.replace('...', '')}</button>`;
            } else {
                resultDiv.innerHTML = `❌ <b>Xatolik (${response.status}):</b><br>${errMsg}`;
            }
            return;
        }

        const data = await response.json();
        console.log("WeatherAPI Response:", data); // Tilni tekshirish uchun
        const current = data.current;
        const location = data.location;
        currentWeatherConditionText = current.condition.text;
        currentWeatherIsDay = current.is_day;
        
        // Fonni yangilash
        updateBackgroundVideo(current.condition.text, current.is_day);

        resultDiv.innerHTML = `
            <h2>${location.name}, ${location.country}</h2>
            <h1>${Math.round(current.temp_c)}°C</h1>
            <p>${current.condition.text}</p>
            
            <div class="details-grid">
                <div>🌡 ${t.feels_like}: ${Math.round(current.feelslike_c)}°C</div>
                <div>💧 ${t.humidity}: ${current.humidity}%</div>
                <div>💨 ${t.wind}: ${(current.wind_kph / 3.6).toFixed(1)} m/s</div>
                <div>🧭 ${t.wind_dir}: ${current.wind_dir}</div>
                <div>☀️ ${t.uv_index}: ${current.uv}</div>
                <div>👁️ ${t.visibility}: ${current.vis_km} km</div>
            </div>
        `;

    } catch (error) {
        resultDiv.innerHTML = `${t.error_net}<br><small>${error.message}</small>`;
        console.error(error);
    }
}

// O'zbekiston vaqti soati
function updateClock() {
    const now = new Date();
    const t = translations[currentLang];
    
    // O'zbekiston vaqti (UTC+5)
    const optionsTime = { timeZone: 'Asia/Tashkent', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const timeString = now.toLocaleTimeString('en-US', optionsTime);
    
    // Sana (Tilga moslashgan)
    const optionsDate = { timeZone: 'Asia/Tashkent', weekday: 'long', day: 'numeric', month: 'long' };
    const dateString = now.toLocaleDateString(t.date_locale, optionsDate);
    
    // Sekundlarni kichikroq qilish uchun HTML formatlash
    const [time, period] = timeString.split(' '); // AM/PM bo'lsa ajratish (bizda 24 soatlik)
    // timeString masalan "14:30:45"
    const parts = timeString.split(':');
    if (parts.length === 3) {
        document.getElementById('clockTime').innerHTML = `${parts[0]}:${parts[1]}<span class="clock-seconds">:${parts[2]}</span>`;
    } else {
        document.getElementById('clockTime').innerText = timeString;
    }
    
    document.getElementById('clockDate').innerText = dateString;
}
